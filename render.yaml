services:
  - type: web
    name: mindwell
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npm run build:frontend
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mindwell.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mindwell-db
          property: connectionString

databases:
  - name: mindwell-db
    plan: free
    databaseName: mindwell
