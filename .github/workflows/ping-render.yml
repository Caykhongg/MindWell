name: Ping Render Server

on:
  schedule:
    - cron: '*/5 * * * *'   # mỗi 5 phút
  workflow_dispatch:         # cho phép chạy tay

jobs:
  ping:
    name: Ping Render
    runs-on: ubuntu-latest
    steps:
      - name: Ping https://mindwell.onrender.com
        run: curl -s -o /dev/null -w "%{http_code} %{time_total}s\n" https://mindwell.onrender.com
